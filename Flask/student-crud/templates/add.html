{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2>Add Student</h2>

    <form action="{{ url_for('student.create') }}" method="POST">

        <div class="form-group">
            <label>Name</label>
            <input
                type="number"
                name="id"
                value=""
                hidden
            >
            <input
                type="text"
                name="name"
                value=""
                required
            >
        </div>

        <div class="form-group">
            <label>Age</label>
            <input
                type="number"
                name="age"
                value=""
                required
            >
        </div>

        <div class="form-group">
            <label>Course</label>
            <input
                type="text"
                name="course"
                value=""
                required
            >
        </div>

        <div class="form-group">
            <label>City</label>
            <input
                type="text"
                name="city"
                value=""
                required
            >
        </div>

        <button type="submit" class="btn btn-success">
            Create Student
        </button>

        <a
            href="{{ url_for('student.list_students') }}"
            class="btn btn-secondary"
        >
            Cancel
        </a>

    </form>

</div>

{% endblock %}
